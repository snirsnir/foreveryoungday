<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>נשים מובילות מדע - יום השיא</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --proj: #0891b2;
    --proj-light: #cff3fb;
    --proj-dark: #0c5f7a;
    --proto: #ea580c;
    --proto-light: #fde8d8;
    --proto-dark: #9c3407;
    --mkt: #7c3aed;
    --mkt-light: #ede9fb;
    --mkt-dark: #5227a8;
    --dark: #1a1a2e;
    --dark2: #16162a;
    --common: #f8f9fa;
    --common-border: #dee2e6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: linear-gradient(145deg, #f0f4f8 0%, #e8ecf2 100%);
    min-height: 100vh;
    padding: 32px 16px 44px;
    direction: rtl;
  }

  .header { text-align: center; margin-bottom: 22px; }
  .header h1 { font-size: 24px; font-weight: 800; color: var(--dark); }
  .header .sub { font-size: 12px; color: #7a8899; margin-top: 4px; }

  .legend {
    display: flex; justify-content: center; gap: 18px;
    margin-bottom: 18px; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: #444; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }

  .wrapper {
    max-width: 1500px; margin: 0 auto;
    overflow-x: auto; border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.05);
    background: #fff;
  }

  table { width: 100%; border-collapse: collapse; min-width: 900px; }

  /* GROUP HEADER */
  .group-header-row th {
    padding: 10px 6px;
    text-align: center;
    color: #fff;
    background: var(--dark);
    border-left: 2px solid rgba(255,255,255,0.15);
    vertical-align: middle;
  }
  .group-header-row th:first-child {
    border-radius: 16px 0 0 0;
    min-width: 108px;
  }
  .group-header-row th:last-child {
    border-radius: 0 16px 0 0;
  }
  .group-header-row .group-name {
    font-size: 11px;
    font-weight: 700;
    display: block;
  }
  .group-header-row .bracelet-info {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    margin-top: 3px;
  }
  .group-header-row .bracelet-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.5);
  }
  .group-header-row .bracelet-name {
    font-size: 10px;
    font-weight: 600;
    opacity: 0.9;
  }

  /* TIME CELLS */
  .time-cell {
    background: var(--dark); color: #cdd6f4;
    text-align: center; padding: 14px 6px;
    border-top: 1px solid #2a2a44; vertical-align: middle;
  }
  .time-cell .t-time { font-size: 14px; font-weight: 800; display: block; color: #eef2ff; }
  .time-cell .t-badge { font-size: 9.5px; color: #6b7a9e; display: block; margin-top: 2px; font-weight: 500; }

  /* COMMON ROW - spans all columns */
  .common-row td {
    background: var(--common);
    border: 1px solid var(--common-border);
    padding: 12px 10px;
    vertical-align: middle;
  }
  .common-row .time-cell {
    background: var(--dark);
    border: none;
  }
  .common-content {
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: #495057;
  }
  .common-content .common-title {
    font-weight: 700;
    color: #212529;
    display: block;
  }
  .common-content .common-location {
    font-size: 11px;
    color: #6c757d;
    margin-top: 2px;
  }

  /* MOTHER LAB CELL — הצגה לפאנל */
  .mother-lab-cell {
    padding: 0;
    vertical-align: middle;
    border: 1px solid rgba(0,0,0,0.07);
    min-width: 110px;
    background: #fff8e1;
    text-align: center;
  }
  .mother-lab-content {
    font-size: 13px;
    font-weight: 800;
    color: #e65100;
    padding: 10px 6px;
  }
  .mother-lab-sub {
    font-size: 10px;
    font-weight: 600;
    color: #bf360c;
    opacity: 0.8;
    display: block;
    margin-top: 2px;
  }

  /* MEET CELL — הכרות עם המנטורים */
  .meet-cell {
    padding: 0;
    vertical-align: top;
    border: 1px solid rgba(0,0,0,0.07);
    min-width: 110px;
    background: #eef2ff;
    text-align: center;
  }
  .meet-bar {
    font-size: 10px;
    font-weight: 700;
    padding: 4px 4px 3px;
    text-align: center;
    color: #fff;
    background: #6366f1;
  }
  .meet-content {
    padding: 10px 6px;
    font-size: 12px;
    font-weight: 700;
    color: #4338ca;
  }
  .meet-lab {
    font-size: 14px;
    font-weight: 800;
    color: #312e81;
    display: block;
    margin-top: 3px;
  }

  /* COLLECT CELL — איסוף ממוזיאון */
  .collect-cell {
    padding: 0;
    vertical-align: middle;
    border: 1px solid rgba(0,0,0,0.07);
    min-width: 110px;
    background: #e0f2f1;
    text-align: center;
  }
  .collect-content {
    font-size: 11px;
    font-weight: 700;
    color: #00695c;
    padding: 8px 6px;
  }
  .collect-dest {
    font-size: 13px;
    font-weight: 800;
    color: #004d40;
    display: block;
    margin-top: 3px;
  }

  /* ACTIVITY CELL */
  .activity-cell {
    padding: 0;
    vertical-align: top;
    border: 1px solid rgba(0,0,0,0.07);
    min-width: 110px;
  }
  .activity-cell.topic-P { background: var(--proj-light); }
  .activity-cell.topic-A { background: var(--proto-light); }
  .activity-cell.topic-M { background: var(--mkt-light); }

  /* Topic name bar at top of cell */
  .topic-bar {
    font-size: 10px;
    font-weight: 700;
    padding: 4px 4px 3px;
    text-align: center;
    color: #fff;
  }
  .topic-P .topic-bar { background: var(--proj); }
  .topic-A .topic-bar { background: var(--proto); }
  .topic-M .topic-bar { background: var(--mkt); }

  /* Content block */
  .activity-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 5px;
    height: 80px;
    gap: 4px;
  }

  /* Lab block */
  .lab-block {
    background: rgba(255,255,255,0.6);
    border-radius: 6px;
    padding: 6px 10px;
    text-align: center;
    width: 100%;
  }
  .lab-name {
    font-size: 13px;
    font-weight: 800;
  }
  .topic-P .lab-name { color: var(--proj-dark); }
  .topic-A .lab-name { color: var(--proto-dark); }
  .topic-M .lab-name { color: var(--mkt-dark); }

  .lab-instructors {
    font-size: 9.5px;
    font-weight: 600;
    opacity: 0.75;
    margin-top: 2px;
    color: #333;
  }

  .note {
    max-width: 700px; margin: 18px auto 0;
    text-align: center; font-size: 11px; color: #8a8a9a; line-height: 1.7;
  }

  /* ===== MENTOR ROW ===== */
  .mentor-row td {
    background: #faf5ff;
    border: 1px solid #e9d5ff;
    vertical-align: top;
    padding: 8px 5px;
    font-size: 10px;
  }
  .mentor-row .time-cell { background: var(--dark); border: none; }
  .mentor-school-label {
    font-weight: 800; font-size: 10.5px; color: #6d28d9;
    display: block; border-bottom: 1px solid #e0c8ff;
    padding-bottom: 2px; margin-bottom: 3px; margin-top: 5px;
  }
  .mentor-school-label:first-child { margin-top: 0; }
  .mentor-entry { line-height: 1.7; }
  .mentor-entry .m-team  { font-weight: 700; color: #374151; }
  .mentor-entry .m-leader { color: #374151; }
  .mentor-entry .m-name  { font-weight: 700; color: #6d28d9; }
  .mentor-none { color: #aaa; font-style: italic; }
</style>
</head>
<body>

<div class="header">
  <h1>🚀 נשים מובילות מדע - יום השיא</h1>
  <div class="sub"></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--proj)"></div>📖 ספר פרויקט</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--proto)"></div>🛠️ אב-טיפוס</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--mkt)"></div>📣 שיווק ופרסום</div>
</div>

<div class="wrapper">
  <table id="tbl"></table>
</div>


<script>
const groups = [
  'אולפנת חריש + אתגרי העתיד חריש',
  'הרב תחומי + מאיר שפיה',
  'מבשרת',
  'נבון 1-4',
  'נבון 5-8',
  'עתידים אור עקיבא',
  'קופטאן דליה',
  'שש שנתי ישי',
];

const bracelets = [
  { name: 'סגול',      color: '#9b59b6' },
  { name: 'חום',       color: '#8B4513' },
  { name: 'צהוב',      color: '#f1c40f' },
  { name: 'ירוק בהיר', color: '#2ecc71' },
  { name: 'כחול',      color: '#3498db' },
  { name: 'אדום',      color: '#e74c3c' },
  { name: 'לבן',       color: '#f0f0f0' },
  { name: 'כתום',      color: '#e67e22' },
];

// Same rotation logic as Day 1 (L→P, C→A, B→M)
const rotation = [
  ['P','A','M'],
  ['P','A','M'],
  ['P','M','A'],
  ['A','P','M'],
  ['A','M','P'],
  ['A','M','P'],
  ['M','P','A'],
  ['M','A','P'],
];

// instructors יכול להיות מחרוזת (קבוע) או מערך של 3 (לפי רצועה 0/1/2)
const labs = [
  // ספר פרויקט (P) — indices 0,1,2
  { name:'מעבדה 1',   topic:'P', instructors:['עפרי + ענת', 'עפרי + ענת', 'אראל + אבי'] },
  //  רצועה א: זיינב עם קופטאן (M) → ענת מחליפה
  //  רצועה ב: זיינב עם קופטאן (A) → ענת מחליפה
  //  רצועה ג: קופטאן כאן → מנאל + זיינב
  { name:'מעבדה 2',   topic:'P', instructors:['יעל + עזריאל', 'מנאל + זיינב', 'יעל + עזריאל'] },
  { name:'מעבדה 6',   topic:'P', instructors:['לידור + אורטל', 'מרי + אורטל', 'לידור + אורטל'] },
  // אב-טיפוס (A) — indices 3,4,5
  { name:'מעבדה 3',   topic:'A', instructors:'סיוון + חיה' },
  { name:'מעבדה 4',   topic:'A', instructors:['איציק + יעלה', 'יעל + עזריאל', 'מנאל + זיינב'] },
  //  רצועה א: מנאל עם קופטאן (M) → איציק + יעלה מחליפים
  //  רצועה ב: קופטאן כאן → מנאל + זיינב
  //  רצועה ג: מנאל עם קופטאן (P) → ענת + איציק מחליפים
  { name:'מעבדה 5',   topic:'A', instructors:'אראל + אבי' },
  // שיווק ופרסום (M) — indices 6,7,8
  { name:'מחשבים 1',  topic:'M', instructors:['מנאל + זיינב', 'יעלה + גילי', 'יעלה + גילי'] },
  { name:'מחשבים 2',  topic:'M', instructors:['מרי + גילי', 'מרי + איציק', 'איציק + ענת'] },
  //  רצועה א: קופטאן כאן → מנאל + זיינב
  //  רצועה ב: לינוי עוברת לשיווק + איציק (שהתפנה מ-A)
  //  רצועה ג: חזרה לאיציק + ענת
  { name:'טכנולוגיה', topic:'M', instructors:'רוני + שי' },
];

const slots = [
  { time:'10:45 – 11:45', badge:'רצועה א\'' },
  { time:'11:45 – 12:45', badge:'רצועה ב\'' },
  { time:'12:45 – 13:45', badge:'רצועה ג\'' },
];

const topicNames = { P:'📖 ספר פרויקט', A:'🛠️ אב-טיפוס', M:'📣 שיווק ופרסום' };

// Build schedule: for each group, for each slot, what lab are they in?
function buildGroupSchedule() {
  const schedule = groups.map(() => []);

  for (let si = 0; si < 3; si++) {
    const byTopic = { P:[], A:[], M:[] };
    rotation.forEach((row, gi) => byTopic[row[si]].push(gi));

    byTopic.P.forEach((gi, i) => {
      schedule[gi][si] = { labIdx: i, topic: 'P' };
    });
    byTopic.A.forEach((gi, i) => {
      schedule[gi][si] = { labIdx: 3 + i, topic: 'A' };
    });
    byTopic.M.forEach((gi, i) => {
      schedule[gi][si] = { labIdx: 6 + i, topic: 'M' };
    });
  }

  return schedule;
}

// קופטאן (group 7) — מנאל + זיינב מלוות אותן כל 3 הרצועות:
//   שיווק      → מחשבים 2 (מנאל + זיינב)    ← אוטומטי, אין צורך בהחלפה
//   אב-טיפוס   → מעבדה 4 (מנאל + זיינב)    labIdx = 4
//   ספר פרויקט → מעבדה 1 (עפרי + לינוי)    labIdx = 0
function applyKoptanConstraint(schedule) {
  const KOPTAN = 7;
  for (let si = 0; si < 3; si++) {
    const kInfo = schedule[KOPTAN][si];

    let targetIdx = null;
    if (kInfo.topic === 'A') targetIdx = 4; // מנאל + לינוי
    if (kInfo.topic === 'P') targetIdx = 0; // עפרי + זיינב

    if (targetIdx !== null && kInfo.labIdx !== targetIdx) {
      // מצא את הקבוצה שנמצאת כרגע במעבדה הרצויה ובצע החלפה
      for (let gi = 0; gi < groups.length; gi++) {
        if (gi !== KOPTAN && schedule[gi][si].labIdx === targetIdx) {
          const displaced = schedule[gi][si].labIdx;
          schedule[gi][si] = { ...schedule[gi][si], labIdx: kInfo.labIdx };
          schedule[KOPTAN][si] = { ...kInfo, labIdx: displaced };
          break;
        }
      }
    }
  }
  return schedule;
}

const groupSchedule = applyKoptanConstraint(buildGroupSchedule());

function renderActivityCell(gi, si) {
  const info = groupSchedule[gi][si];
  const topic = info.topic;
  const lab = labs[info.labIdx];
  const instructors = Array.isArray(lab.instructors) ? lab.instructors[si] : lab.instructors;

  return `
    <td class="activity-cell topic-${topic}">
      <div class="topic-bar">${topicNames[topic]}</div>
      <div class="activity-content">
        <div class="lab-block">
          <div class="lab-name">${lab.name}</div>
          <div class="lab-instructors">${instructors}</div>
        </div>
      </div>
    </td>`;
}

// Render common row (spans all groups)
function renderCommonRow(time, badge, title, location) {
  let h = '<tr class="common-row">';
  h += `<td class="time-cell">
    <span class="t-time" dir="ltr">${time}</span>
    ${badge ? `<span class="t-badge">${badge}</span>` : ''}
  </td>`;
  h += `<td colspan="${groups.length}">
    <div class="common-content">
      <span class="common-title">${title}</span>
      ${location ? `<span class="common-location">${location}</span>` : ''}
    </div>
  </td>`;
  h += '</tr>';
  return h;
}

(function render() {
  const tbl = document.getElementById('tbl');
  let h = '';

  // Header row with group names
  h += '<tr class="group-header-row">';
  h += '<th></th>';
  groups.forEach((group, gi) => {
    const bracelet = bracelets[gi];
    const braceletHTML = `<div class="bracelet-info">
      <span class="bracelet-dot" style="background:${bracelet.color}"></span>
      <span class="bracelet-name">${bracelet.name}</span>
    </div>`;
    h += `<th>
      <span class="group-name">${group}</span>
      ${braceletHTML}
    </th>`;
  });
  h += '</tr>';

  // === MENTOR ROW (filled async from Firebase) ===
  h += '<tr class="mentor-row">';
  h += `<td class="time-cell"><span class="t-badge" style="color:#c4b5fd;font-size:10px;">🧑‍🏫 מנטוריות<br>מלוות</span></td>`;
  for (let gi = 0; gi < groups.length; gi++) {
    h += `<td id="mentor-cell-${gi}"><span class="mentor-none">טוען...</span></td>`;
  }
  h += '</tr>';

  // === COMMON: הגעה, התאספות ונשנושים ===
  h += renderCommonRow('09:00 – 09:45', '', '☕ הגעה, התאספות ונשנושים', 'במבואה');

  // === COMMON: פתיחה ===
  h += renderCommonRow('09:45 – 10:15', '', '🎉 פתיחה', 'ברחבה החיצונית');

  // === הכרות עם המנטוריום — כל קבוצה במעבדה של רצועה א׳ ===
  h += '<tr>';
  h += `<td class="time-cell">
    <span class="t-time" dir="ltr">10:15 – 10:45</span>
    <span class="t-badge">🤝 הכרות עם המנטורים</span>
  </td>`;
  groups.forEach((_, gi) => {
    const lab = labs[groupSchedule[gi][0].labIdx];
    h += `<td class="meet-cell">
      <div class="meet-bar">🤝 הכרות עם המנטורים</div>
      <div class="meet-content">
        <span class="meet-lab">${lab.name}</span>
      </div>
    </td>`;
  });
  h += '</tr>';

  // === ROTATION SLOTS (different for each group) ===
  slots.forEach((slot, si) => {
    h += '<tr>';
    h += `<td class="time-cell">
      <span class="t-time" dir="ltr">${slot.time}</span>
      <span class="t-badge">${slot.badge}</span>
    </td>`;
    groups.forEach((_, gi) => {
      h += renderActivityCell(gi, si);
    });
    h += '</tr>';
  });

  // === COMMON: ארוחת צהריים ===
  h += renderCommonRow('13:45 – 14:30', '', '🥗 ארוחת צהריים', 'במבואה');

  // שיוכי מעבדה מיוחדים לאיסוף והצגה (מיזוגים)
  const endOfDayOverrides = {
    2: { labName: 'מעבדה 3', partner: 'יחד עם קופטאן דליה' },               // מבשרת
    3: { labName: 'מעבדה 4', partner: 'יחד עם שש שנתי ישי' },               // נבון 1-4
    4: { labName: 'מעבדה 5' },                                                // נבון 5-8
    5: { labName: 'מעבדה 6' },                                                // עתידים אור עקיבא
    6: { labName: 'מעבדה 3', partner: 'יחד עם מבשרת' },                     // קופטאן דליה
    7: { labName: 'מעבדה 4', partner: 'יחד עם נבון 1-4' },                  // שש שנתי ישי
  };

  // === איסוף הפרויקטים — לפי מעבדות רצועה א׳ ===
  h += '<tr>';
  h += `<td class="time-cell">
    <span class="t-time" dir="ltr">14:30 – 15:30</span>
    <span class="t-badge">📦 איסוף פרויקטים</span>
  </td>`;
  groups.forEach((_, gi) => {
    const ov = endOfDayOverrides[gi];
    const labName = ov ? ov.labName : labs[groupSchedule[gi][0].labIdx].name;
    const partner = ov ? ov.partner : null;
    h += `<td class="collect-cell">
      <div class="collect-content">
        🎯 סבב השלמות ודיוקים אחרונים
        <span class="collect-dest">+ איסוף ממוזיאון המדע ל${labName}</span>
        ${partner ? `<span style="font-size:9px;color:#00695c;display:block;margin-top:2px;">(${partner})</span>` : ''}
      </div>
    </td>`;
  });
  h += '</tr>';

  // === הצגה לפאנל — לפי מעבדות רצועה א׳ ===
  h += '<tr>';
  h += `<td class="time-cell">
    <span class="t-time" dir="ltr">15:30 – 17:00</span>
    <span class="t-badge">⭐ הצגה לפאנל</span>
  </td>`;
  groups.forEach((_, gi) => {
    const ov = endOfDayOverrides[gi];
    const labName = ov ? ov.labName : labs[groupSchedule[gi][0].labIdx].name;
    const partner = ov ? ov.partner : null;
    h += `<td class="mother-lab-cell">
      <div class="mother-lab-content">
        ⭐ ${labName}
        <span class="mother-lab-sub">הצגה לפאנל המומחים</span>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyCQdei2zVCXkYh99pLPzr_ZMyi8ohupVhY",
  authDomain: "forever-4a04b.firebaseapp.com",
  databaseURL: "https://forever-4a04b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "forever-4a04b",
  storageBucket: "forever-4a04b.firebasestorage.app",
  messagingSenderId: "250928700713",
  appId: "1:250928700713:web:25d6979fca637b90d42b38"
});
const db = getDatabase(app);

// מיפוי: לכל עמודה (gi) — אילו בתי ספר + אילו קבוצות (null = כולן)
const groupSchoolMapping = [
  [{ school: 'אולפנת חריש',       teams: null }, { school: 'אתגרי העתיד חריש', teams: null }],
  [{ school: 'הרב תחומי',         teams: null }, { school: 'מאיר שפיה',          teams: null }],
  [{ school: 'מבשרת חדרה',        teams: null }],
  [{ school: 'נבון חדרה',          teams: [1,2,3,4] }],
  [{ school: 'נבון חדרה',          teams: [5,6,7,8] }],
  [{ school: 'עתידים אור עקיבא',  teams: null }],
  [{ school: 'קופטאן דליה',        teams: null }],
  [{ school: 'שש שנתי ישי',        teams: null }],
];

async function loadMentors() {
  try {
    const snap = await get(ref(db, 'teams'));
    const teamsData = snap.val() || {};

    groupSchoolMapping.forEach((schoolList, gi) => {
      const cell = document.getElementById(`mentor-cell-${gi}`);
      if (!cell) return;

      let html = '';
      schoolList.forEach(({ school, teams }) => {
        const schoolData = teamsData[school];
        html += `<span class="mentor-school-label">${school}</span>`;
        if (!schoolData) { html += `<div class="mentor-none">אין נתונים</div>`; return; }

        const sorted = Object.entries(schoolData)
          .filter(([teamName]) => {
            if (!teams) return true;
            const n = parseInt(teamName.replace(/\D/g, ''));
            return teams.includes(n);
          })
          .sort(([a], [b]) => parseInt(a.replace(/\D/g,'')) - parseInt(b.replace(/\D/g,'')));

        sorted.forEach(([teamName, teamData]) => {
          if (!teamData || typeof teamData !== 'object') return;
          const students = Array.isArray(teamData.students)
            ? teamData.students : Object.values(teamData.students || {});
          const leader = students.length > 0 ? students[0].split(' ')[0] : '—';

          const assigned = Object.values(teamData.assignedMentors || {});
          const firstName = name => {
            const p = name.split(' ');
            return p[0] === "דר'" ? `דר' ${p[1] || ''}`.trim() : p[0];
          };
          const mentorStr = assigned.length
            ? assigned.map(m => m.mentors.map(x => firstName(x.name)).join(' + ')).join(', ')
            : '<span class="mentor-none">ללא שיבוץ</span>';

          html += `<div class="mentor-entry">
            <span class="m-team">${teamName}</span> -
            <span class="m-leader">${leader}</span> -
            <span class="m-name">${mentorStr}</span>
          </div>`;
        });
      });

      cell.innerHTML = html || '<span class="mentor-none">אין נתונים</span>';
    });
  } catch (err) {
    console.error('loadMentors error:', err);
    document.querySelectorAll('[id^="mentor-cell-"]').forEach(c => {
      c.innerHTML = '<span class="mentor-none">שגיאה בטעינה</span>';
    });
  }
}

loadMentors();
</script>
