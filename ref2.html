<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחוון שיפוט - נשים מובילות מדע</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Heebo', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 250px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23f9d77e" fill-opacity="0.3" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,138.7C960,139,1056,117,1152,101.3C1248,85,1344,75,1392,69.3L1440,64L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path></svg>') no-repeat top center;
            background-size: cover;
            z-index: -1;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 300px;
            background: #7B1E7A;
            z-index: -2;
            clip-path: polygon(0 30%, 100% 0, 100% 100%, 0 100%);
        }

        .logos-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            padding: 20px;
            background: white;
            flex-wrap: wrap;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            max-width: 800px;
            margin: 0 auto 20px auto;
        }

        .logo-item { height: 80px; display: flex; align-items: center; }
        .logo-item img { height: 100%; width: auto; object-fit: contain; }

        .form-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .form-header {
            background: linear-gradient(135deg, #7B1E7A 0%, #9B4D9A 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
        }

        .form-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="80" cy="30" r="1.5" fill="rgba(255,255,255,0.1)"/><circle cx="40" cy="70" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="90" cy="80" r="2.5" fill="rgba(255,255,255,0.1)"/><circle cx="10" cy="60" r="1.5" fill="rgba(255,255,255,0.1)"/></svg>');
        }

        .form-title   { font-size: 2.2rem; font-weight: 700; margin-bottom: 10px; position: relative; z-index: 1; }
        .form-subtitle { font-size: 1.1rem; opacity: 0.9; position: relative; z-index: 1; }

        .form-content { padding: 40px 30px; }

        .form-group {
            margin-bottom: 30px;
            animation: fadeIn 0.6s ease-out forwards;
            opacity: 0;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }
        .form-group:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeIn { to { opacity: 1; } }

        .form-label {
            display: block;
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }

        .required { color: #e91e63; margin-right: 5px; }

        .form-select {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            background: white;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-select:focus {
            outline: none;
            border-color: #7B1E7A;
            box-shadow: 0 0 0 3px rgba(123,30,122,0.1);
            transform: translateY(-2px);
        }

        .form-select:hover { border-color: #9B4D9A; }

        /* ===== Criterion card ===== */
        .criterion-card {
            border: 2px solid #e8d5e8;
            border-radius: 14px;
            margin-bottom: 14px;
            transition: border-color 0.2s;
        }

        .criterion-card.has-rating { border-color: #b07ab0; }

        .criterion-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 13px 16px;
            background: #faf6fa;
            border-radius: 12px 12px 0 0;
        }

        .criterion-number {
            font-size: 0.78rem;
            font-weight: 800;
            color: #7B1E7A;
            background: #ede0ed;
            padding: 3px 8px;
            border-radius: 6px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .criterion-title {
            flex: 1;
            font-weight: 700;
            font-size: 0.97rem;
            color: #222;
        }

        .criterion-toggle {
            background: none;
            border: 2px solid #c8a0c8;
            color: #7B1E7A;
            width: 28px;
            height: 28px;
            border-radius: 7px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            font-weight: 700;
            line-height: 1;
        }

        .criterion-toggle:hover { background: #ede0ed; border-color: #7B1E7A; }

        .criterion-body { padding: 10px 16px 14px; }

        /* ===== Stars ===== */
        .rating-container {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            justify-content: center;
            direction: rtl;
        }

        .star {
            font-size: 34px;
            color: #ddd;
            cursor: pointer;
            transition: color 0.15s ease, transform 0.15s ease;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.08));
            user-select: none;
            line-height: 1;
        }

        .star.active {
            color: #ffd700;
            filter: drop-shadow(0 3px 6px rgba(255,215,0,0.45));
        }

        .star.hover { transform: scale(1.15); }

        /* ===== Rubric ===== */
        .criterion-rubric {
            display: none;
            border-top: 1px solid #e8d5e8;
            padding: 14px 16px;
            background: #fdf8fd;
            border-radius: 0 0 12px 12px;
            font-size: 0.87rem;
            line-height: 1.65;
        }

        .criterion-rubric.open { display: block; }

        .rubric-scores {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 12px;
        }

        .rubric-score-row { display: flex; gap: 8px; }

        .rubric-score-num {
            font-weight: 800;
            color: #7B1E7A;
            min-width: 16px;
            flex-shrink: 0;
        }

        .sub-criteria {
            border-top: 1px dashed #d4b0d4;
            padding-top: 10px;
        }

        .sub-criteria-title {
            font-weight: 700;
            font-size: 0.88rem;
            color: #7B1E7A;
            margin-bottom: 8px;
        }

        .sub-criterion-row { display: flex; gap: 5px; margin-bottom: 7px; color: #444; }

        .sub-criterion-bullet {
            font-weight: 700;
            color: #555;
            flex-shrink: 0;
            white-space: nowrap;
        }

        /* ===== Submit ===== */
        .submit-container {
            text-align: center;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }

        .submit-btn {
            background: linear-gradient(135deg, #7B1E7A, #9B4D9A);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(123,30,122,0.3);
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(123,30,122,0.4); }
        .submit-btn:hover::before { left: 100%; }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .clear-btn {
            background: transparent;
            color: #666;
            border: 2px solid #e0e0e0;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 15px;
        }

        .clear-btn:hover { border-color: #7B1E7A; color: #7B1E7A; transform: translateY(-2px); }

        .form-note { text-align: center; color: #666; font-size: 0.9rem; margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px; }

        .success-message {
            display: none;
            background: linear-gradient(135deg, #4caf50, #45a049);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-top: 20px;
            font-weight: 600;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .error-message { color: #e91e63; font-size: 0.9rem; margin-top: 8px; display: none; }

        .loading { display: none; text-align: center; padding: 20px; }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #7B1E7A;
            border-radius: 50%;
            width: 30px; height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .form-container { margin: 10px; border-radius: 15px; }
            .form-header { padding: 30px 20px; }
            .form-title { font-size: 1.8rem; }
            .form-content { padding: 25px 15px; }
            .star { font-size: 28px; }
        }
    </style>
</head>

                    { score: 5, text: 'אב-טיפוס איכותי שממחיש חוויית שימוש אמיתית.' },
                ],
                subTitle: 'מוצר (אב-טיפוס) – איך זה בעצם נראה? (Prototyping: Usability & Making)',
                sub: [
                    { label: 'הורדה לקרקע:', text: 'האם הדגם (או האפליקציה) ממחיש היטב איך המוצר נראה ומרגיש במציאות?' },
                    { label: 'איכות הביצוע:', text: 'האם ניכרת חשיבה והשקעה בבחירת החומרים, במבנה ובאסתטיקה של הדגם?' },
                    { label: 'הנדסת אנוש ונוחות:', text: 'האם המוצר הגיוני, נוח ופשוט לשימוש עבור המשתמשת?' },
                ]
            },
            {
                id: 'business', num: '06', title: 'מודל עסקי ושיווק',
                rubric: [
                    { score: 1, text: 'אין תכנית שיווקית ברורה.' },
                    { score: 2, text: 'רעיון כללי ללא ישימות ברורה.' },
                    { score: 3, text: 'תכנית בסיסית והגיונית.' },
                    { score: 4, text: 'אסטרטגיה ברורה וריאלית להגעה לשוק.' },
                    { score: 5, text: 'תכנית משכנעת, ממוקדת וישימה מאוד.' },
                ],
                subTitle: 'מודל עסקי ושיווק – איך אפשר לשווק את המוצר? (Go-To-Market: Feasibility)',
                sub: [
                    { label: 'ערוצי הפצה:', text: 'האם התשובה לשאלה "איך העולם יידע?" היא הגיונית ויצירתית? (מותאמת לקהל היעד הנשי שלהן).' },
                    { label: 'נגישות המוצר:', text: 'האם הן הגדירו בבירור איך משיגים את המוצר? (חנות / הורדה בחינם / קנייה) – והאם זה ריאלי?' },
                    { label: 'יכולת שכנוע:', text: 'האם התוכנית העסקית/שיווקית שלהן נשמעת משכנעת וישימה?' },
                ]
            },
            {
                id: 'presentation', num: '07', title: 'ההצגה והצוות',
                rubric: [
                    { score: 1, text: 'הצגה לא ברורה או חוסר שיתוף פעולה.' },
                    { score: 2, text: 'הצגה חלקית, מעורבות לא שווה בצוות.' },
                    { score: 3, text: 'הצגה מסודרת ושיתוף פעולה ניכר.' },
                    { score: 4, text: 'הצגה סוחפת ועבודת צוות טובה מאוד.' },
                    { score: 5, text: 'הופעה מקצועית, בטוחה ומעוררת השראה עם עבודת צוות מצטיינת.' },
                ],
                subTitle: 'ההצגה והצוות – The X-Factor (Pitch & Team)',
                sub: [
                    { label: 'סטוריטלינג:', text: 'האם הסיפור היה מעניין, סוחף ומובנה היטב?' },
                    { label: 'כוח קבוצתי (Team Power):', text: 'האם כל חברות הצוות היו מעורבות? האם היה פרגון הדדי ועבודה משותפת?' },
                    { label: 'מקצועיות:', text: 'האם הן שלטו בחומר וענו לשאלות בביטחון ובידע?' },
                ]
            },
        ];

        // ── Build criteria cards ──────────────────────────────────────
        const criteriaSection = document.getElementById('criteria-section');

        CRITERIA.forEach(c => {
            const card = document.createElement('div');
            card.className = 'criterion-card';
            card.id = 'card-' + c.id;

            const rubricHtml = c.rubric.map(r =>
                `<div class="rubric-score-row">
                    <span class="rubric-score-num">${r.score}</span>
                    <span>${r.text}</span>
                </div>`
            ).join('');

            const subHtml = c.sub.map(s =>
                `<div class="sub-criterion-row">
                    <span class="sub-criterion-bullet">${s.label}</span>
                    <span>${s.text}</span>
                </div>`
            ).join('');

            card.innerHTML = `
                <div class="criterion-header">
                    <span class="criterion-number">${c.num}</span>
                    <span class="criterion-title">${c.title}</span>
                    <button type="button" class="criterion-toggle" data-id="${c.id}">+</button>
                </div>
                <div class="criterion-body">
                    <div class="rating-container" id="stars-${c.id}">
                        <span class="star" data-value="1">★</span>
                        <span class="star" data-value="2">★</span>
                        <span class="star" data-value="3">★</span>
                        <span class="star" data-value="4">★</span>
                        <span class="star" data-value="5">★</span>
                    </div>
                    <input type="hidden" id="val-${c.id}" name="${c.id}">
                    <div class="error-message" id="${c.id}-error">נא לדרג קריטריון זה</div>
                </div>
                <div class="criterion-rubric" id="rubric-${c.id}">
                    <div class="rubric-scores">${rubricHtml}</div>
                    <div class="sub-criteria">
                        <div class="sub-criteria-title">${c.subTitle}</div>
                        ${subHtml}
                    </div>
                </div>
            `;

            criteriaSection.appendChild(card);

            // Toggle +/−
            card.querySelector('.criterion-toggle').addEventListener('click', () => {
                const rubricEl  = document.getElementById('rubric-' + c.id);
                const toggleBtn = card.querySelector('.criterion-toggle');
                const isOpen    = rubricEl.classList.contains('open');
                rubricEl.classList.toggle('open', !isOpen);
                toggleBtn.textContent = isOpen ? '+' : '−';
            });

            // Stars
            const container   = document.getElementById('stars-' + c.id);
            const hiddenInput = document.getElementById('val-' + c.id);
            const stars       = container.querySelectorAll('.star');

            function setFill(upTo) {
                stars.forEach((s, i) => s.classList.toggle('active', i < upTo));
            }

            container.addEventListener('mousemove', e => {
                const star = e.target.closest('.star');
                if (!star) return;
                setFill(parseInt(star.dataset.value, 10));
                stars.forEach(s => s.classList.remove('hover'));
                star.classList.add('hover');
            });

            container.addEventListener('mouseleave', () => {
                setFill(parseInt(hiddenInput.value) || 0);
                stars.forEach(s => s.classList.remove('hover'));
            });

            container.addEventListener('click', e => {
                const star = e.target.closest('.star');
                if (!star) return;
                const val = parseInt(star.dataset.value, 10);
                hiddenInput.value = val;
                setFill(val);
                card.classList.add('has-rating');
                const err = document.getElementById(c.id + '-error');
                if (err) err.style.display = 'none';
            });
        });

        // ── Load judges ───────────────────────────────────────────────
        async function loadJudges() {
            const judgesSel = document.getElementById('judges');
            try {
                const snap = await get(ref(teamsDb, 'judges'));
                const raw  = snap.val();
                judgesSel.innerHTML = '<option value="">בחר זוג שופטים</option>';
                if (!raw) return;

                const items = Array.isArray(raw) ? raw : Object.values(raw);
                const seen = new Set();
                items.forEach(item => {
                    if (!item) return;
                    let label = '';
                    if (typeof item === 'string') {
                        label = item;
                    } else if (item.name && item.pair) {
                        // canonical key — sorted so A+B and B+A are the same pair
                        const key = [item.name, item.pair].sort().join('|');
                        if (seen.has(key)) return;
                        seen.add(key);
                        label = `${item.name} ו${item.pair}`;
                    } else if (item.name) {
                        label = item.name;
                    } else if (item.judge1 && item.judge2) {
                        label = `${item.judge1} ו${item.judge2}`;
                    }
                    if (label) judgesSel.appendChild(new Option(label, label));
                });
            } catch (err) {
                console.error('שגיאה בטעינת שופטים:', err);
                judgesSel.innerHTML = '<option value="">שגיאה בטעינה</option>';
            }
        }

        // ── Load teams ────────────────────────────────────────────────
        let teamsData = {};

        async function loadTeams() {
            try {
                const snap = await get(ref(teamsDb, 'teams'));
                teamsData = snap.val() || {};
                const schoolSel = document.getElementById('school');
                Object.keys(teamsData).sort().forEach(school => {
                    if (!teamsData[school] || typeof teamsData[school] !== 'object') return;
                    schoolSel.appendChild(new Option(school, school));
                });
            } catch (err) {
                console.error('שגיאה בטעינת בתי ספר:', err);
            }
        }

        document.getElementById('school').addEventListener('change', function () {
            const school   = this.value;
            const groupSel = document.getElementById('group');
            groupSel.innerHTML = '<option value="">בחירה</option>';
            groupSel.disabled  = !school;
            if (!school || !teamsData[school]) return;

            const sorted = Object.entries(teamsData[school]).sort(([a], [b]) => {
                const na = parseInt(a.replace(/\D/g, ''), 10);
                const nb = parseInt(b.replace(/\D/g, ''), 10);
                if (!isNaN(na) && !isNaN(nb)) return na - nb;
                return a.localeCompare(b, 'he');
            });

            // build team list with students
            const teamItems = sorted.map(([teamName, teamData]) => {
                if (!teamData) return null;
                const students = Array.isArray(teamData.students)
                    ? teamData.students
                    : Object.values(teamData.students || {});
                return { teamName, students };
            }).filter(Boolean);

            teamItems.forEach(({ teamName, students }) => {
                const displayName = students.length > 0 ? students[0].split(' ')[0] : '';
                const label = displayName ? `${teamName} - ${displayName}` : teamName;
                groupSel.appendChild(new Option(label, label));
            });
        });

        loadJudges();
        loadTeams();

        // ── Validation ────────────────────────────────────────────────
        function validateForm() {
            let ok = true;

            ['judges', 'school', 'group'].forEach(id => {
                const el  = document.getElementById(id);
                const err = document.getElementById(id + '-error');
                if (!el.value) { err.style.display = 'block'; ok = false; }
                else err.style.display = 'none';
            });

            CRITERIA.forEach(c => {
                const val = document.getElementById('val-' + c.id).value;
                const err = document.getElementById(c.id + '-error');
                if (!val) { err.style.display = 'block'; ok = false; }
                else err.style.display = 'none';
            });

            return ok;
        }

        // ── Submit ────────────────────────────────────────────────────
        const form           = document.getElementById('judgeForm');
        const submitBtn      = document.getElementById('submitBtn');
        const clearBtn       = document.getElementById('clearBtn');
        const loading        = document.getElementById('loading');
        const successMessage = document.getElementById('successMessage');

        form.addEventListener('submit', async e => {
            e.preventDefault();
            if (!validateForm()) return;

            loading.style.display = 'block';
            submitBtn.disabled = true;

            try {
                const judgesVal = document.getElementById('judges').value;
                const groupName = document.getElementById('group').value;
                const judgesKey = judgesVal.replace(/[.#$[\]/\s]/g, '_');
                const groupKey  = groupName.replace(/[.#$[\]/\s]/g, '_');

                const ratings = {};
                CRITERIA.forEach(c => {
                    ratings[c.id] = parseInt(document.getElementById('val-' + c.id).value);
                });

                const data = {
                    judges:    judgesVal,
                    school:    document.getElementById('school').value,
                    group:     groupName,
                    ratings,
                    timestamp: new Date().toISOString(),
                    date:      new Date().toLocaleDateString('he-IL')
                };

                await set(ref(submitDb, `ref2/${groupKey}/${judgesKey}`), data);

                loading.style.display = 'none';
                successMessage.style.display = 'block';

                setTimeout(() => {
                    const savedJudges = document.getElementById('judges').value;
                    form.reset();
                    successMessage.style.display = 'none';
                    submitBtn.disabled = false;
                    resetCriteria();
                    // restore judges selection
                    document.getElementById('judges').value = savedJudges;
                    const gSel = document.getElementById('group');
                    gSel.innerHTML = '<option value="">בחר בית ספר תחילה</option>';
                    gSel.disabled = true;
                }, 3000);

            } catch (err) {
                console.error(err);
                loading.style.display = 'none';
                submitBtn.disabled = false;
                alert('שגיאה בשליחת הטופס. נסה שוב.');
            }
        });

        // ── Clear ─────────────────────────────────────────────────────
        function resetCriteria() {
            CRITERIA.forEach(c => {
                document.getElementById('val-' + c.id).value = '';
                document.getElementById('stars-' + c.id)
                    .querySelectorAll('.star')
                    .forEach(s => s.classList.remove('active', 'hover'));
                document.getElementById('rubric-' + c.id).classList.remove('open');
                const toggleBtn = document.querySelector(`[data-id="${c.id}"]`);
                if (toggleBtn) toggleBtn.textContent = '+';
                document.getElementById('card-' + c.id)?.classList.remove('has-rating');
            });
        }

        clearBtn.addEventListener('click', () => {
            if (!confirm('האם אתה בטוח שברצונך לנקות את הטופס?')) return;
            form.reset();
            document.querySelectorAll('.error-message').forEach(e => e.style.display = 'none');
            successMessage.style.display = 'none';
            submitBtn.disabled = false;
            resetCriteria();
            const gSel = document.getElementById('group');
            gSel.innerHTML = '<option value="">בחר בית ספר תחילה</option>';
            gSel.disabled = true;
        });

        document.querySelectorAll('select').forEach(el => {
            el.addEventListener('change', () => {
                const err = document.getElementById(el.id + '-error');
                if (err && el.value) err.style.display = 'none';
            });
        });
    </script>
</body>
</html>
