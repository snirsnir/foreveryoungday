<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כרטיסי שולחן - Forever Young</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Heebo', sans-serif;
            direction: rtl;
            background: #bbb;
        }

        .page {
            page-break-after: always;
            width: 210mm;
            height: 297mm;
            position: relative;
            background: white;
            margin: 0 auto 10px;
        }

        .page:last-child {
            page-break-after: avoid;
        }

        .fold-line {
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 2px;
            background: repeating-linear-gradient(
                to right,
                #ff0000 0, #ff0000 5mm,
                transparent 5mm, transparent 10mm
            );
            z-index: 10;
            transform: translateY(-50%);
        }

        .fold-line::before {
            content: "קו קיפול";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ff0000;
            color: white;
            padding: 2px 8px;
            font-size: 9px;
            font-weight: bold;
            border-radius: 3px;
        }

        .station-half {
            width: 100%;
            height: 50%;
            position: absolute;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 7mm 9mm;
        }

        .station-half.top {
            top: 0;
            transform: rotate(180deg);
        }

        .station-half.bottom {
            bottom: 0;
        }

        /* ─── כרטיס קבוצה ─── */
        .group-card {
            width: 100%;
            height: 100%;
            border-radius: 16px;
            border: 7px solid var(--bracelet);
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ─── שורת לוגואים ─── */
        .logos-bar {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 4mm 8mm 3mm;
            border-bottom: 1.5px solid rgba(0,0,0,0.1);
            background: #fafafa;
            flex-shrink: 0;
        }

        .logos-bar img {
            height: 11mm;
            max-width: 38mm;
            object-fit: contain;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
        }

        /* ─── גוף הכרטיס ─── */
        .card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4mm 12mm;
            gap: 5mm;
            text-align: center;
        }

        .event-tag {
            font-size: 17px;
            font-weight: 600;
            color: #aaa;
            letter-spacing: 2px;
        }

        .group-name {
            font-size: 64px;
            font-weight: 900;
            color: #111;
            line-height: 1.18;
        }

        /* ─── רצועת צמיד תחתית ─── */
        .bracelet-footer {
            background: var(--bracelet);
            padding: 5mm 12mm;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .bracelet-text {
            font-size: 26px;
            font-weight: 800;
        }

        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }
            body {
                background: white;
            }
            .page {
                margin: 0;
            }
        }
    </style>
</head>
<body>
<script>
    const groups = [
        {
            name: 'אולפנת חריש\nאתגרי העתיד חריש',
            bracelet: '#9b59b6',
            colorName: 'סגול',
            textColor: 'white'
        },
        {
            name: 'הרב תחומי\nמאיר שפיה',
            bracelet: '#8B4513',
            colorName: 'חום',
            textColor: 'white'
        },
        {
            name: 'מבשרת',
            bracelet: '#f1c40f',
            colorName: 'צהוב',
            textColor: '#333'
        },
        {
            name: 'נבון 1-4',
            bracelet: '#2ecc71',
            colorName: 'ירוק',
            textColor: '#1a1a1a'
        },
        {
            name: 'נבון 5-8',
            bracelet: '#3498db',
            colorName: 'כחול',
            textColor: 'white'
        },
        {
            name: 'עתידים\nאור עקיבא',
            bracelet: '#e74c3c',
            colorName: 'אדום',
            textColor: 'white'
        },
        {
            name: 'קופטאן דליה',
            bracelet: '#b0b0b0',
            colorName: 'לבן',
            textColor: '#333',
            dotColor: '#f0f0f0'
        },
        {
            name: 'שש שנתי ישי',
            bracelet: '#e67e22',
            colorName: 'כתום',
            textColor: 'white'
        }
    ];

    const logosHTML = `
        <img src="logot.png"      alt="טכנודע">
        <img src="logoastra.png"  alt="AstraZeneca">
        <img src="clalit.png"     alt="כללית">
        <img src="logonashim.png" alt="נשים מובילות מדע">
    `;

    function createCard(group) {
        const nameLines = group.name.split('\n').join('<br>');
        return `
            <div class="group-card" style="--bracelet:${group.bracelet};">
                <div class="logos-bar">${logosHTML}</div>
                <div class="card-body">
                    <div class="event-tag">Forever Young</div>
                    <div class="group-name">${nameLines}</div>
                </div>
                <div class="bracelet-footer">
                    <div class="bracelet-text" style="color:${group.textColor};">
                        צמיד ${group.colorName}
                    </div>
                </div>
            </div>
        `;
    }

    function generatePages() {
        groups.forEach(group => {
            const card = createCard(group);
            const page = document.createElement('div');
            page.className = 'page';
            page.innerHTML = `
                <div class="fold-line"></div>
                <div class="station-half top">${card}</div>
                <div class="station-half bottom">${card}</div>
            `;
            document.body.appendChild(page);
        });
    }

    document.addEventListener('DOMContentLoaded', generatePages);
</script>
</body>
</html>
