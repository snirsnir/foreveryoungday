<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>גלריית הקבוצה - נשים מובילות מדע</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f5eef5;
            color: #333;
            min-height: 100vh;
        }

        .page-header {
            background: linear-gradient(135deg, #5a1058, #7B1E7A, #9B4D9A);
            color: white;
            padding: 20px 16px 14px;
            text-align: center;
        }

        .header-logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin-bottom: 14px;
        }

        .header-logos img {
            height: 44px;
            object-fit: contain;
            filter: brightness(0) invert(1);
            opacity: 0.9;
        }

        .page-header h1 {
            font-size: 1.6em;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .header-meta {
            font-size: 14px;
            opacity: 0.8;
            letter-spacing: 0.5px;
            padding-bottom: 4px;
        }

        /* ===== BREADCRUMB ===== */
        .breadcrumb {
            background: rgba(0,0,0,0.25);
            padding: 9px 18px;
            display: none;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            font-size: 13px;
            border-top: 1px solid rgba(255,255,255,0.15);
        }
        .breadcrumb.visible { display: flex; }

        .bc-item {
            color: rgba(255,255,255,0.72);
            cursor: pointer;
            transition: color 0.2s;
        }
        .bc-item:hover { color: #fff; text-decoration: underline; }
        .bc-item.active { color: #f9d77e; font-weight: 700; cursor: default; }
        .bc-sep { color: rgba(255,255,255,0.35); }

        /* ===== GALLERY CONTAINER ===== */
        .gallery-container {
            max-width: 960px;
            margin: 24px auto;
            padding: 0 16px 40px;
        }

        /* States */
        .state-box {
            text-align: center;
            padding: 70px 20px;
        }
        .state-box .state-icon { font-size: 56px; margin-bottom: 16px; }
        .state-box .state-text { font-size: 1.1em; color: #777; }
        .state-box .state-text.error { color: #e74c3c; }

        /* ===== BROWSE GRID ===== */
        .section-title {
            font-size: 17px;
            font-weight: 700;
            color: #7B1E7A;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e8d5e8;
        }

        .browse-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 14px;
        }

        .browse-card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 4px 18px rgba(123,30,122,0.09);
            padding: 22px 14px 16px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            border: 2px solid transparent;
        }
        .browse-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 28px rgba(123,30,122,0.18);
            border-color: #9B4D9A;
        }
        .browse-card .bc-icon { font-size: 36px; margin-bottom: 10px; display: block; }
        .browse-card .bc-name {
            font-size: 14px;
            font-weight: 700;
            color: #333;
            line-height: 1.4;
        }
        .browse-card .bc-sub { font-size: 11px; color: #999; margin-top: 5px; }
        .browse-card .bc-badge {
            display: inline-block;
            background: #f3e5f5;
            color: #7B1E7A;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 9px;
            border-radius: 10px;
            margin-top: 8px;
        }
        .browse-card .bc-badge.has-files { background: #e8f5e9; color: #2e7d32; }

        /* ===== GALLERY GRID ===== */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 18px;
        }

        .file-card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 4px 18px rgba(123,30,122,0.1);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .file-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 28px rgba(123,30,122,0.18);
        }

        .card-img {
            width: 100%;
            height: 190px;
            object-fit: cover;
            display: block;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .card-img:hover { opacity: 0.88; }

        .card-video {
            width: 100%;
            height: 190px;
            object-fit: cover;
            display: block;
            background: #000;
        }

        .card-audio-wrap {
            height: 190px;
            background: linear-gradient(135deg, #f3e5f5, #e1bee7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            gap: 12px;
        }
        .card-audio-icon { font-size: 48px; }
        .card-audio-wrap audio { width: 100%; outline: none; }

        .card-file-placeholder {
            height: 190px;
            background: linear-gradient(135deg, #f3e5f5, #e8d5e8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .card-file-placeholder .file-icon { font-size: 52px; }
        .card-file-placeholder .file-ext {
            font-size: 12px;
            font-weight: 700;
            color: #7B1E7A;
            background: rgba(123,30,122,0.1);
            padding: 3px 10px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .card-footer {
            padding: 10px 13px 12px;
            border-top: 1px solid #f0e6f0;
        }
        .card-name {
            font-size: 13px;
            font-weight: 600;
            color: #444;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-bottom: 8px;
        }
        .btn-open {
            display: block;
            text-align: center;
            background: linear-gradient(135deg, #7B1E7A, #9B4D9A);
            color: white;
            text-decoration: none;
            padding: 7px 14px;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 600;
            transition: opacity 0.2s, transform 0.15s;
        }
        .btn-open:hover { opacity: 0.85; transform: scale(1.02); }

        /* ===== LIGHTBOX ===== */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.93);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .lightbox.open { display: flex; }
        .lightbox-inner {
            position: relative;
            max-width: 95vw;
            max-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lightbox-inner img {
            max-width: 95vw;
            max-height: 88vh;
            border-radius: 10px;
            object-fit: contain;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .lightbox-close {
            position: fixed;
            top: 14px;
            left: 14px;
            background: rgba(255,255,255,0.18);
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            padding: 5px 13px;
            border-radius: 8px;
            line-height: 1.5;
            backdrop-filter: blur(4px);
            transition: background 0.2s;
            z-index: 1001;
        }
        .lightbox-close:hover { background: rgba(255,255,255,0.32); }

        @media (max-width: 600px) {
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
            .card-img, .card-video, .card-audio-wrap, .card-file-placeholder { height: 150px; }
            .page-header h1 { font-size: 1.3em; }
            .browse-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }
    </style>
</head>
<body>

    <div class="page-header">
        <div class="header-logos">
            <img src="logot.png" alt="טכנודע" onerror="this.style.display='none'">
            <img src="logoastra.png" alt="AstraZeneca" onerror="this.style.display='none'">
            <img src="clalit.png" alt="כללית" onerror="this.style.display='none'">
        </div>
        <h1>🎨 גלריית הקבוצה</h1>
        <div class="header-meta" id="headerMeta">נשים מובילות מדע</div>

        <!-- Breadcrumb (inside header, shown in browse mode) -->
        <div class="breadcrumb" id="breadcrumb">
            <span class="bc-item" id="bcHome" onclick="goHome()">🏠 כל בתי הספר</span>
            <span class="bc-sep" id="bcSep1" style="display:none;">›</span>
            <span class="bc-item" id="bcSchool" style="display:none;" onclick="goSchool()"></span>
            <span class="bc-sep" id="bcSep2" style="display:none;">›</span>
            <span class="bc-item active" id="bcGroup" style="display:none;"></span>
        </div>
    </div>

    <div class="gallery-container">
        <div class="state-box" id="loadingState">
            <div class="state-icon">⏳</div>
            <div class="state-text">טוען...</div>
        </div>

        <!-- Browse: Schools -->
        <div id="browseSchools" style="display:none;">
            <div class="section-title">🏫 בחרו בית ספר</div>
            <div class="browse-grid" id="schoolsGrid"></div>
        </div>

        <!-- Browse: Groups -->
        <div id="browseGroups" style="display:none;">
            <div class="section-title" id="groupsTitle">👥 בחרו קבוצה</div>
            <div class="browse-grid" id="groupsGrid"></div>
        </div>

        <!-- Gallery -->
        <div class="gallery-grid" id="galleryGrid" style="display:none;"></div>

        <div class="state-box" id="emptyState" style="display:none;">
            <div class="state-icon">📂</div>
            <div class="state-text">לא נמצאו קבצים בגלריה זו</div>
        </div>

        <div class="state-box" id="errorState" style="display:none;">
            <div class="state-icon">❌</div>
            <div class="state-text error" id="errorMsg"></div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        <div class="lightbox-inner" onclick="event.stopPropagation()">
            <img id="lightboxImg" src="" alt="">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCQdei2zVCXkYh99pLPzr_ZMyi8ohupVhY",
            authDomain: "forever-4a04b.firebaseapp.com",
            databaseURL: "https://forever-4a04b-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "forever-4a04b",
            storageBucket: "forever-4a04b.firebasestorage.app",
            messagingSenderId: "250928700713",
            appId: "1:250928700713:web:25d6979fca637b90d42b38"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ===== Cache =====
        let teamsCache = null;
        let sessionsCache = null;
        let currentSchoolKey = null;

        // ===== Helpers =====
        function displayKey(key) {
            return key.replace(/_/g, ' ').trim();
        }

        function hideAll() {
            ['loadingState','browseSchools','browseGroups','galleryGrid','emptyState','errorState']
                .forEach(id => { document.getElementById(id).style.display = 'none'; });
        }

        function showLoading() {
            hideAll();
            document.getElementById('loadingState').style.display = 'block';
        }

        function showError(msg) {
            hideAll();
            document.getElementById('errorState').style.display = 'block';
            document.getElementById('errorMsg').textContent = msg;
        }

        // ===== Breadcrumb =====
        function setBreadcrumb(schoolKey, groupKey) {
            const bc = document.getElementById('breadcrumb');
            bc.classList.add('visible');

            const bcSchool = document.getElementById('bcSchool');
            const bcGroup  = document.getElementById('bcGroup');

            if (schoolKey) {
                document.getElementById('bcSep1').style.display = 'inline';
                bcSchool.textContent = '🏫 ' + displayKey(schoolKey);
                bcSchool.style.display = 'inline';
                bcSchool.classList.toggle('active', !groupKey);
            } else {
                document.getElementById('bcSep1').style.display = 'none';
                bcSchool.style.display = 'none';
            }

            if (groupKey) {
                document.getElementById('bcSep2').style.display = 'inline';
                bcGroup.textContent = '👥 ' + displayKey(groupKey);
                bcGroup.style.display = 'inline';
            } else {
                document.getElementById('bcSep2').style.display = 'none';
                bcGroup.style.display = 'none';
            }

            document.getElementById('bcHome').classList.toggle('active', !schoolKey && !groupKey);
        }

        // ===== Navigation =====
        window.goHome = function() {
            history.pushState({}, '', window.location.pathname);
            showSchoolBrowser();
        };

        window.goSchool = function() {
            if (!currentSchoolKey) return;
            history.pushState({}, '', window.location.pathname + '?school=' + encodeURIComponent(currentSchoolKey));
            showGroupBrowser(currentSchoolKey);
        };

        // ===== Load Teams =====
        async function getTeams() {
            if (teamsCache) return teamsCache;
            const snap = await get(ref(db, 'teams'));
            teamsCache = snap.exists() ? snap.val() : {};
            return teamsCache;
        }

        // ===== Load Sessions =====
        async function getSessions() {
            if (sessionsCache) return sessionsCache;
            const snap = await get(ref(db, 'sessions'));
            sessionsCache = snap.exists() ? snap.val() : {};
            return sessionsCache;
        }

        // ===== SCHOOL BROWSER =====
        async function showSchoolBrowser() {
            showLoading();
            document.getElementById('headerMeta').textContent = 'נשים מובילות מדע';
            setBreadcrumb(null, null);
            currentSchoolKey = null;

            try {
                const teams = await getTeams();
                const schools = Object.keys(teams);

                if (!schools.length) {
                    showError('לא נמצאו בתי ספר.');
                    return;
                }

                // Count sessions per school
                const sessions = await getSessions();
                const schoolFileCounts = {};
                Object.values(sessions).forEach(s => {
                    if (s.school) {
                        schoolFileCounts[s.school] = (schoolFileCounts[s.school] || 0) + (s.files ? Object.values(s.files).length : 0);
                    }
                });

                const grid = document.getElementById('schoolsGrid');
                grid.innerHTML = schools.map(key => {
                    const name = displayKey(key);
                    const groupCount = Object.keys(teams[key] || {}).length;
                    const fileCount = schoolFileCounts[key] || 0;
                    return `
                        <div class="browse-card" onclick="selectSchool('${key.replace(/'/g,"\\'")}')">
                            <span class="bc-icon">🏫</span>
                            <div class="bc-name">${name}</div>
                            <div class="bc-sub">${groupCount} קבוצות</div>
                            ${fileCount ? `<span class="bc-badge has-files">📁 ${fileCount} קבצים</span>` : '<span class="bc-badge">אין קבצים עדיין</span>'}
                        </div>`;
                }).join('');

                hideAll();
                document.getElementById('browseSchools').style.display = 'block';

            } catch (err) {
                showError('שגיאה בטעינת בתי הספר: ' + err.message);
            }
        }

        window.selectSchool = function(schoolKey) {
            history.pushState({}, '', window.location.pathname + '?school=' + encodeURIComponent(schoolKey));
            showGroupBrowser(schoolKey);
        };

        // ===== GROUP BROWSER =====
        async function showGroupBrowser(schoolKey) {
            showLoading();
            currentSchoolKey = schoolKey;
            document.getElementById('headerMeta').textContent = displayKey(schoolKey);
            setBreadcrumb(schoolKey, null);

            try {
                const teams = await getTeams();
                const schoolData = teams[schoolKey] || {};
                const groups = Object.keys(schoolData);

                if (!groups.length) {
                    showError('לא נמצאו קבוצות לבית הספר הזה.');
                    return;
                }

                // Count sessions per group
                const sessions = await getSessions();
                const groupFileCounts = {};
                Object.values(sessions).forEach(s => {
                    if (s.school === schoolKey && s.group) {
                        groupFileCounts[s.group] = (groupFileCounts[s.group] || 0) + (s.files ? Object.values(s.files).length : 0);
                    }
                });

                document.getElementById('groupsTitle').textContent = '👥 קבוצות — ' + displayKey(schoolKey);

                const grid = document.getElementById('groupsGrid');
                grid.innerHTML = groups.map(gKey => {
                    const name = displayKey(gKey);
                    const groupData = schoolData[gKey] || {};
                    const students = Array.isArray(groupData.students)
                        ? groupData.students
                        : Object.values(groupData.students || {});
                    const studentCount = students.filter(s => s && s.trim()).length;
                    const fileCount = groupFileCounts[gKey] || 0;

                    return `
                        <div class="browse-card" onclick="selectGroup('${schoolKey.replace(/'/g,"\\'")}', '${gKey.replace(/'/g,"\\'")}')">
                            <span class="bc-icon">👥</span>
                            <div class="bc-name">${name}</div>
                            <div class="bc-sub">${studentCount ? studentCount + ' תלמידות' : ''}</div>
                            ${fileCount ? `<span class="bc-badge has-files">📁 ${fileCount} קבצים</span>` : '<span class="bc-badge">אין קבצים עדיין</span>'}
                        </div>`;
                }).join('');

                hideAll();
                document.getElementById('browseGroups').style.display = 'block';

            } catch (err) {
                showError('שגיאה בטעינת קבוצות: ' + err.message);
            }
        }

        window.selectGroup = function(schoolKey, groupKey) {
            history.pushState({}, '', window.location.pathname + '?school=' + encodeURIComponent(schoolKey) + '&group=' + encodeURIComponent(groupKey));
            showGroupGallery(schoolKey, groupKey);
        };

        // ===== GROUP GALLERY =====
        async function showGroupGallery(schoolKey, groupKey) {
            showLoading();
            currentSchoolKey = schoolKey;
            document.getElementById('headerMeta').textContent = displayKey(schoolKey) + ' · ' + displayKey(groupKey);
            setBreadcrumb(schoolKey, groupKey);

            try {
                const sessions = await getSessions();

                // Collect all files from all sessions for this school+group
                const allFiles = [];
                Object.values(sessions).forEach(s => {
                    if (s.school === schoolKey && s.group === groupKey && s.files) {
                        const files = Array.isArray(s.files) ? s.files : Object.values(s.files);
                        allFiles.push(...files);
                    }
                });

                if (!allFiles.length) {
                    hideAll();
                    document.getElementById('emptyState').style.display = 'block';
                    return;
                }

                const grid = document.getElementById('galleryGrid');
                grid.innerHTML = allFiles.map(renderFile).join('');
                hideAll();
                grid.style.display = 'grid';

            } catch (err) {
                showError('שגיאה בטעינת גלריה: ' + err.message);
            }
        }

        // ===== SESSION GALLERY (existing behavior) =====
        async function loadSession(sessionId) {
            showLoading();
            try {
                const snap = await get(ref(db, `sessions/${sessionId}`));
                document.getElementById('loadingState').style.display = 'none';

                if (!snap.exists()) {
                    showError('הגלריה לא נמצאה. ייתכן שהקישור פג תוקף.');
                    return;
                }

                const session = snap.val();
                const parts = [session.school, session.group].filter(p => p && p !== 'כללי');
                if (parts.length) {
                    document.getElementById('headerMeta').textContent =
                        parts.map(displayKey).join(' · ') + ' | נשים מובילות מדע';
                }

                const rawFiles = session.files;
                const files = Array.isArray(rawFiles) ? rawFiles : Object.values(rawFiles || {});

                if (!files.length) {
                    document.getElementById('emptyState').style.display = 'block';
                    return;
                }

                const grid = document.getElementById('galleryGrid');
                grid.innerHTML = files.map(renderFile).join('');
                grid.style.display = 'grid';

            } catch (err) {
                showError('שגיאה בטעינה: ' + err.message);
            }
        }

        // ===== File Rendering =====
        function getFileIcon(type) {
            if (!type) return '📎';
            if (type.startsWith('image/')) return '🖼️';
            if (type.startsWith('video/')) return '🎬';
            if (type.startsWith('audio/')) return '🎵';
            if (type.includes('pdf')) return '📄';
            if (type.includes('presentation') || type.includes('powerpoint')) return '📊';
            if (type.includes('word') || type.includes('document')) return '📝';
            return '📎';
        }

        function getFileExt(name) {
            const parts = name.split('.');
            return parts.length > 1 ? parts[parts.length - 1] : '';
        }

        function renderFile(file) {
            const { name, url, type } = file;
            const safeUrl = url.replace(/"/g, '%22');
            const isImage = type && type.startsWith('image/');
            const isVideo = type && type.startsWith('video/');
            const isAudio = type && type.startsWith('audio/');

            let previewHtml;
            if (isImage) {
                previewHtml = `<img class="card-img" src="${safeUrl}" alt="${name}" loading="lazy"
                     data-url="${safeUrl}" onclick="openLightbox(this.dataset.url)">`;
            } else if (isVideo) {
                previewHtml = `<video class="card-video" src="${safeUrl}" controls preload="metadata"></video>`;
            } else if (isAudio) {
                previewHtml = `<div class="card-audio-wrap">
                        <div class="card-audio-icon">🎵</div>
                        <audio src="${safeUrl}" controls></audio>
                    </div>`;
            } else {
                const ext = getFileExt(name);
                previewHtml = `<div class="card-file-placeholder">
                        <span class="file-icon">${getFileIcon(type)}</span>
                        ${ext ? `<span class="file-ext">${ext}</span>` : ''}
                    </div>`;
            }

            return `<div class="file-card">
                    ${previewHtml}
                    <div class="card-footer">
                        <div class="card-name" title="${name}">${name}</div>
                        <a class="btn-open" href="${safeUrl}" target="_blank">⬇️ פתח / הורד</a>
                    </div>
                </div>`;
        }

        // ===== Lightbox =====
        window.openLightbox = function(src) {
            document.getElementById('lightboxImg').src = src;
            document.getElementById('lightbox').classList.add('open');
            document.body.style.overflow = 'hidden';
        };

        window.closeLightbox = function() {
            document.getElementById('lightbox').classList.remove('open');
            document.getElementById('lightboxImg').src = '';
            document.body.style.overflow = '';
        };

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') window.closeLightbox();
        });

        // ===== Router =====
        function route() {
            const params = new URLSearchParams(window.location.search);
            const sessionId = params.get('session');
            const schoolKey = params.get('school');
            const groupKey  = params.get('group');

            if (sessionId) {
                loadSession(sessionId);
            } else if (schoolKey && groupKey) {
                showGroupGallery(schoolKey, groupKey);
            } else if (schoolKey) {
                showGroupBrowser(schoolKey);
            } else {
                showSchoolBrowser();
            }
        }

        // Handle browser back/forward
        window.addEventListener('popstate', route);

        route();
    </script>
</body>
</html>
